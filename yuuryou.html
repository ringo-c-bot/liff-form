<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アヤの星読み本鑑定</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
      background: linear-gradient(135deg, #0a0520 0%, #1a0a3e 50%, #0d1a3a 100%);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }
    .container {
      max-width: 480px;
      margin: 0 auto;
      padding: 20px;
    }
    .header {
      text-align: center;
      margin-bottom: 30px;
    }
    .header h1 {
      font-size: 22px;
      color: #FFD700;
      margin-bottom: 8px;
    }
    .header p {
      font-size: 13px;
      color: #c8a8ff;
      line-height: 1.6;
    }
    .form-group {
      margin-bottom: 20px;
    }
    label {
      display: block;
      font-size: 14px;
      color: #FFD700;
      margin-bottom: 6px;
    }
    .required {
      color: #ff6b9d;
      margin-left: 4px;
    }
    input, textarea {
      width: 100%;
      padding: 12px;
      border: 1px solid rgba(200, 168, 255, 0.4);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: white;
      font-size: 15px;
      -webkit-appearance: none;
      appearance: none;
      min-height: 48px;
    }
    input::placeholder, textarea::placeholder {
      color: rgba(255, 255, 255, 0.35);
    }
    textarea { height: 120px; resize: none; }
    .note {
      font-size: 12px;
      color: #c8a8ff;
      margin-top: 5px;
      line-height: 1.5;
    }
    .warning {
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid rgba(255, 107, 157, 0.3);
      border-radius: 8px;
      padding: 12px;
      font-size: 12px;
      color: #ffb3d1;
      margin-bottom: 24px;
      line-height: 1.6;
    }
    .btn {
      width: 100%;
      padding: 16px;
      background: linear-gradient(135deg, #f7a02f, #f72f7b);
      border: none;
      border-radius: 12px;
      color: white;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      letter-spacing: 1px;
    }
    .btn:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }
    .success {
      text-align: center;
      padding: 40px 20px;
      display: none;
    }
    .success h2 {
      color: #FFD700;
      font-size: 20px;
      margin-bottom: 12px;
    }
    .success p {
      color: #c8a8ff;
      font-size: 14px;
      line-height: 1.8;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>⭐️ アヤの星読み本鑑定 ⭐</h1>
      <p>ご購入ありがとうございます🌸<br>以下の情報を入力してな✨</p>
    </div>

    <div id="form-area">
      <div class="form-group">
        <label>注文番号<span class="required">*</span></label>
        <input type="text" id="orderNum" placeholder="STORESの注文番号を入力してな">
      </div>

      <div class="form-group">
        <label>お名前<span class="required">*</span></label>
        <input type="text" id="userName" placeholder="ニックネームでもOKやよ">
      </div>

      <div class="form-group">
        <label>生年月日<span class="required">*</span></label>
        <input type="date" id="birthday">
      </div>

      <div class="form-group">
        <label>出生時刻<span class="required">*</span></label>
        <input type="time" id="birthTime">
        <p class="note">わからない場合は12:00と入力してな🌸</p>
      </div>

      <div class="form-group">
        <label>出生地<span class="required">*</span></label>
        <input type="text" id="birthPlace" placeholder="例）京都府京都市">
        <p class="note">都道府県と市区町村まで教えてもらえると嬉しいな🌿</p>
      </div>

      <div class="form-group">
        <label>相談内容<span class="required">*</span></label>
        <textarea id="soudan" placeholder="書ける範囲で自由に書いてな🔮"></textarea>
      </div>

      <div class="warning">
        ※人の生死や病気の診断、犯罪や法律に関わる内容など、人生に重要な影響を及ぼすものについては対応が難しいんよ。ごめんな🙏
      </div>

      <p id="error-msg" style="display:none; color:#ff6b9d; font-size:13px; margin-bottom:12px;">
        全部の項目を入力してな🌸
      </p>

      <button class="btn" id="submitBtn" onclick="submitForm()">
        🔮 鑑定をお願いする
      </button>
    </div>

    <div class="success" id="success-area">
      <h2>✨ 受け取ったよ！</h2>
      <p>アヤが確認してから<br>鑑定を開始するから<br>少し待っててな✨<br><br>1〜3日以内に鑑定書を<br>LINEにお届けするよ🔮🌸</p>
    </div>
  </div>

  <script>
    let liffUserId = '';

    async function initLiff() {
      try {
        await liff.init({ liffId: '2009475505-inzLXZGk' });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        liffUserId = profile.userId;
      } catch(e) {
        console.error('LIFF初期化エラー：', e);
      }
    }

    async function submitForm() {
      const orderNum   = document.getElementById('orderNum').value.trim();
      const userName   = document.getElementById('userName').value.trim();
      const birthday   = document.getElementById('birthday').value;
      const birthTime  = document.getElementById('birthTime').value;
      const birthPlace = document.getElementById('birthPlace').value.trim();
      const soudan     = document.getElementById('soudan').value.trim();

      if (!orderNum || !userName || !birthday || !birthTime || !birthPlace || !soudan) {
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      document.getElementById('error-msg').style.display = 'none';

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx18KZpgmWybpZjhnSGfb_ZdOxDzh5zl4gr1Ji00PzJ_ids-RDg4R6kKS_Jy_PzxnUO/exec';
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'yuuryou',
            userId: liffUserId,
            orderNum, userName, birthday, birthTime, birthPlace, soudan
          })
        });

        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';

      } catch(e) {
        document.getElementById('error-msg').textContent = '送信エラーが発生したんよ😔もう一度試してな';
        document.getElementById('error-msg').style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🔮 情報を送る';
      }
    }

   // 生年月日の設定
const today = new Date().toISOString().split('T')[0];
const birthdayInput = document.getElementById('birthday');
birthdayInput.max = today;
birthdayInput.addEventListener('focus', function() {
  if (!this.value) this.value = '2000-01-01';
});

    initLiff();
  </script>
</body>
</html>
