<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>アヤの無料星読み鑑定</title>
  <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/versions/2.22.3/sdk.js"></script>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Hiragino Kaku Gothic Pro', sans-serif;
      background: linear-gradient(135deg, #0a0520 0%, #1a0a3e 50%, #0d1a3a 100%);
      min-height: 100vh;
      padding: 20px;
      color: white;
    }
    .container { max-width: 480px; margin: 0 auto; padding: 20px; }
    .header { text-align: center; margin-bottom: 30px; }
    .header h1 { font-size: 22px; color: #FFD700; margin-bottom: 8px; }
    .header p { font-size: 13px; color: #c8a8ff; line-height: 1.6; }
    .form-group { margin-bottom: 20px; }
    label { display: block; font-size: 14px; color: #FFD700; margin-bottom: 6px; }
    .required { color: #ff6b9d; margin-left: 4px; }
    input, textarea, select {
      width: 100%; padding: 12px;
      border: 1px solid rgba(200, 168, 255, 0.4);
      border-radius: 8px;
      background: rgba(255, 255, 255, 0.08);
      color: white; font-size: 15px;
      -webkit-appearance: none; appearance: none; min-height: 48px;
    }
    input::placeholder, textarea::placeholder { color: rgba(255, 255, 255, 0.35); }
    textarea { height: 120px; resize: none; }
    .note { font-size: 12px; color: #c8a8ff; margin-top: 5px; line-height: 1.5; }
    .warning {
      background: rgba(255, 107, 157, 0.1);
      border: 1px solid rgba(255, 107, 157, 0.3);
      border-radius: 8px; padding: 12px;
      font-size: 12px; color: #ffb3d1;
      margin-bottom: 24px; line-height: 1.6;
    }
    .btn {
      width: 100%; padding: 16px;
      background: linear-gradient(135deg, #7b2ff7, #f72f7b);
      border: none; border-radius: 12px;
      color: white; font-size: 16px; font-weight: bold;
      cursor: pointer; letter-spacing: 1px;
    }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; }
    .success { text-align: center; padding: 40px 20px; display: none; }
    .success h2 { color: #FFD700; font-size: 20px; margin-bottom: 12px; }
    .success p { color: #c8a8ff; font-size: 14px; line-height: 1.8; }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>🔮 アヤの無料星読み鑑定</h1>
      <p>星を読む前に少し情報を教えてな✨<br>丁寧に読み解かせてもらうよ🌸</p>
    </div>

    <!-- ローディング画面 -->
    <div id="loading-area" style="text-align:center; padding:40px 20px;">
      <p style="color:#c8a8ff; font-size:14px;">読み込み中...🔮</p>
    </div>

    <!-- 入力フォーム（最初は非表示） -->
    <div id="form-area" style="display:none;">
      <div class="form-group">
        <label>お名前<span class="required">*</span></label>
        <input type="text" id="userName" placeholder="ニックネームでもOKやよ">
      </div>

      <div class="form-group">
        <label>生年月日<span class="required">*</span></label>
        <input type="date" id="birthday" style="width:100%">
      </div>

      <div class="form-group">
        <label>相談内容<span class="required">*</span></label>
        <textarea id="soudan" placeholder="書ける範囲で自由に書いてな。詳しく書いてもらえるほど深い鑑定ができるよ🔮"></textarea>
        <p class="note">※相談内容は1つに絞ってな🌸<br>複数ある場合は一番気になることを書いてな✨</p>
      </div>

      <div class="warning">
        ※人の生死や病気の診断、犯罪や法律に関わる内容など、人生に重要な影響を及ぼすものについては対応が難しいんよ。ごめんな🙏
      </div>

      <p id="error-msg" style="display:none; color:#ff6b9d; font-size:13px; margin-bottom:12px;">
        全部の項目を入力してな🌸
      </p>
      <button class="btn" id="submitBtn" onclick="submitForm()">
        🌟 鑑定をお願いする
      </button>
    </div>

    <!-- 送信完了画面 -->
    <div class="success" id="success-area">
      <h2>✨ 受け取ったよ！</h2>
      <p>アヤが今星を読んでるから<br>少し待っててな🔮<br><br>LINEに鑑定結果をお届けするから<br>楽しみに待っててな🌸</p>
    </div>

    <!-- 鑑定済み画面 -->
    <div id="kantei-zumi-area" style="display:none; text-align:center; padding:40px 20px;">
      <h2 style="color:#FFD700; font-size:20px; margin-bottom:12px;">✨ ご確認</h2>
      <p style="color:#c8a8ff; font-size:14px; line-height:1.8;">
        すでに無料鑑定を受けてくれてるんよ🌸<br><br>
        もっと深く視たい時は<br>
        本鑑定で待ってるな✨
      </p>
    </div>

  </div>

  <script>
    let liffUserId = '';

    async function initLiff() {
      try {
        await liff.init({ liffId: '2009474205-F7E8jktC' });
        if (!liff.isLoggedIn()) {
          liff.login();
          return;
        }
        const profile = await liff.getProfile();
        liffUserId = profile.userId;

        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx18KZpgmWybpZjhnSGfb_ZdOxDzh5zl4gr1Ji00PzJ_ids-RDg4R6kKS_Jy_PzxnUO/exec';
        const res = await fetch(GAS_URL + '?check=' + liffUserId);
        const json = await res.json();

        document.getElementById('loading-area').style.display = 'none';

        if (json.kanteiZumi) {
          document.getElementById('kantei-zumi-area').style.display = 'block';
        } else {
          document.getElementById('form-area').style.display = 'block';
        }

      } catch(e) {
        console.error('LIFF初期化エラー：', e);
        document.getElementById('loading-area').style.display = 'none';
        document.getElementById('form-area').style.display = 'block';
      }
    }

    async function submitForm() {
      const userName = document.getElementById('userName').value.trim();
      const birthday = document.getElementById('birthday').value;
      const soudan   = document.getElementById('soudan').value.trim();

      if (!userName || !birthday || !soudan) {
        document.getElementById('error-msg').style.display = 'block';
        return;
      }

      document.getElementById('error-msg').style.display = 'none';

      const btn = document.getElementById('submitBtn');
      btn.disabled = true;
      btn.textContent = '送信中...';

      try {
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbx18KZpgmWybpZjhnSGfb_ZdOxDzh5zl4gr1Ji00PzJ_ids-RDg4R6kKS_Jy_PzxnUO/exec';
        await fetch(GAS_URL, {
          method: 'POST',
          mode: 'no-cors',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({
            type: 'muryou',
            userId: liffUserId,
            userName, birthday, soudan
          })
        });

        document.getElementById('form-area').style.display = 'none';
        document.getElementById('success-area').style.display = 'block';

      } catch(e) {
        document.getElementById('error-msg').textContent = '送信エラーが発生したんよ😔もう一度試してな';
        document.getElementById('error-msg').style.display = 'block';
        btn.disabled = false;
        btn.textContent = '🌟 鑑定をお願いする';
      }
    }

    const today = new Date().toISOString().split('T')[0];
    const birthdayInput = document.getElementById('birthday');
    birthdayInput.max = today;
    birthdayInput.addEventListener('focus', function() {
      if (!this.value) this.value = '2000-01-01';
    });

    initLiff();
  </script>
</body>
</html>
